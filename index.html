<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>普通話水平測試朗讀作品6號</title>
    <style>
        /* --- 字體與基礎設置 --- */
        @font-face {
            font-family: 'StandardPinyin';
            src: local('Calibri'), local('Arial');
        }
        
        :root {
            --primary-color: #4a90e2;
            --text-color: #333;
            --pinyin-color: #666;
            --highlight-color: #ffd700;
            --bg-color: #f9f9f9;
            --track-height: 60px;
        }

        body {
            font-family: 'Yuanti SC', 'YouYuan', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            padding-bottom: calc(var(--track-height) + 40px); /* 防止底部軌道遮擋 */
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- 頂部標題 --- */
        .header-fixed {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            padding: 10px 20px;
            text-align: right;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 100;
            box-sizing: border-box;
        }

        .page-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin: 0;
        }

        .disclaimer {
            font-size: 0.7rem;
            color: #888;
            margin-top: 5px;
            line-height: 1.4;
        }

        /* --- 登錄遮罩 --- */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            text-align: center;
            width: 100%;
            max-width: 320px;
        }

        .login-box h1 {
            margin-bottom: 30px;
            color: var(--primary-color);
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            font-family: inherit;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background-color: #357abd;
        }

        .error-msg {
            color: #ff4444;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }

        /* --- 主內容 --- */
        .container {
            max-width: 800px;
            margin: 100px auto 20px; /* 留出頂部空間 */
            padding: 0 20px;
        }

        .sentence-block {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .sentence-block.active {
            border: 2px solid var(--primary-color);
            transform: scale(1.01);
        }

        .pinyin {
            font-family: 'StandardPinyin', 'Calibri', sans-serif;
            font-size: 1.1rem;
            color: var(--pinyin-color);
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .hanzi {
            font-size: 1.4rem;
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .controls {
            display: flex;
            align-items: center;
        }

        .play-btn {
            background: none;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            border-radius: 50px;
            padding: 8px 20px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
            outline: none;
        }

        .play-btn:hover {
            background: var(--primary-color);
            color: white;
        }

        .play-btn.playing {
            background: var(--primary-color);
            color: white;
        }

        /* --- 底部功能區 --- */
        .footer-section {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 60px; /* 給底部軌道留空間 */
        }

        .complete-btn {
            background-color: #ccc;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: not-allowed;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .complete-btn.active {
            background-color: #2ecc71; /* 綠色 */
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #666;
            font-size: 1rem;
            padding: 10px 20px;
            border-radius: 8px;
            background: rgba(0,0,0,0.03);
            transition: background 0.2s;
        }

        .back-link:hover {
            background: rgba(0,0,0,0.08);
        }

        /* --- 底部獎勵軌道 --- */
        .reward-track {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--track-height);
            background: rgba(255,255,255,0.95);
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            z-index: 90;
            padding: 0 10px;
            box-sizing: border-box;
            backdrop-filter: blur(5px);
        }

        .star {
            font-size: 1.2rem;
            color: #ddd; /* 空心/未完成顏色 */
            transition: color 0.5s, transform 0.5s;
        }

        .star.earned {
            color: var(--highlight-color);
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
            transform: scale(1.2);
        }

        .trophy {
            font-size: 1.5rem;
            color: #ddd;
            margin-left: 10px;
            transition: all 0.5s;
        }

        .trophy.earned {
            color: #ff9900;
            filter: drop-shadow(0 0 8px #ff9900);
            transform: scale(1.3) rotate(15deg);
        }

        /* --- 彈窗 --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 80%;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-btn {
            margin-top: 20px;
            padding: 10px 25px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* --- 開發者模式 --- */
        #dev-toggle {
            position: fixed;
            top: 10px;
            left: 10px;
            font-size: 20px;
            color: #ccc;
            cursor: pointer;
            z-index: 200;
            opacity: 0.5;
            display: none; /* 默認隱藏 */
        }

        #dev-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 600px;
            background: #000;
            color: #0f0;
            padding: 20px;
            border-radius: 10px;
            z-index: 2000;
            font-family: monospace;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #dev-panel textarea {
            width: 100%;
            height: 150px;
            background: #111;
            color: #0f0;
            border: 1px solid #333;
            margin-top: 10px;
        }
        
        .dev-controls button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px 10px;
            margin-right: 5px;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <!-- 開發者入口 (僅 Windows 可見) -->
    <div id="dev-toggle" onclick="toggleDevMode()">🛠️</div>

    <!-- 登錄頁面 -->
    <div id="login-overlay">
        <div class="login-box">
            <h1>開始練習</h1>
            <input type="text" id="username" class="login-input" placeholder="請輸入您的名字" autocomplete="off">
            <input type="password" id="password" class="login-input" placeholder="請輸入密碼">
            <button class="login-btn" onclick="checkLogin()">進入</button>
            <div id="error-msg" class="error-msg">請輸入正確密碼</div>
        </div>

    <!-- 頂部標題 -->
    <div class="header-fixed">
        <h2 class="page-title">普通話水平測試朗讀作品6號</h2>
        <div class="disclaimer">
            本網頁拼音均由AI生成，標準注音請參考《普通話水平測試實施綱要（2021年版）》。<br>
            錄音僅供參考。網頁僅供VTC内部使用。職業訓練局普通話培訓測試中心版權所有。
        </div>
    </div>

    <!-- 主內容區 -->
    <div class="container" id="content-area">
        <!-- 句子將由 JS 動態生成 -->
    </div>

    <!-- 底部功能區 -->
    <div class="footer-section">
        <button id="complete-btn" class="complete-btn" onclick="finishPractice()">我已完成跟讀練習啦！</button>
        <br>
        <a href="https://echo02-game.github.io/pscleadreading-hub/" class="back-link">
            <span>📖</span> 回主目錄
        </a>
    </div>

    <!-- 底部獎勵軌道 -->
    <div class="reward-track" id="reward-track">
        <!-- 星星由 JS 動態生成 -->
    </div>

    <!-- 彈窗 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>太棒啦！</h3>
            <p>打卡信息已複製，快去分享努力後的喜悅吧！</p>
            <button class="modal-btn" onclick="closeModal()">關閉</button>
        </div>
    </div>

    <!-- 開發者面板 -->
    <div id="dev-panel">
        <h3>開發者時間軸錄製工具</h3>
        <div class="dev-controls">
            <button onclick="startDevRecording()">開始錄製模式 (Auto Play)</button>
            <button onclick="markNext()">標記下一句 (Space)</button>
        </div>
        <div id="dev-status" style="margin: 10px 0; color: #fff;">準備就緒...</div>
        <textarea id="dev-output" placeholder="生成的 JSON 將顯示在這裡..."></textarea>
        <button onclick="closeDevMode()" style="margin-top:10px;">關閉面板</button>
    </div>

    <!-- 音頻對象 -->
    <audio id="audio-player" src="pscleadreading06.mp4" preload="auto"></audio>

    <script>
        // --- 核心數據 (作品6號數據) ---

        let sentenceData = [
    {
        "text": "立春過後，大地漸漸從沉睡中蘇醒過來。",
        "pinyin": "Lìchūn guòhòu, dàdì jiànjiàn cóng chénshuì zhōng sūxǐng guòlái.",

    },
    {

        "pinyin": "Yúshì zhuǎnrù yánrè de xiàjì, zhè shì zhíwù yùnyù guǒshí de shíqī.",

        "end": 34.66
    },
    {
        "text": "到了秋天，果實成熟，植物的葉子漸漸變黃，在秋風中簌簌地落下來。",
        "pinyin": "Dào le qiūtiān, guǒshí chéngshú, zhíwù de yèzi jiànjiàn biànhuáng, zài qiūfēng zhōng sùsù de luò xiàlái.",
        "start": 34.66,
        "end": 46.32
    },
    {
        "text": "北雁南飛，活躍在田間草際的昆蟲也都銷聲匿跡。",
        "pinyin": "Běiyàn nánfēi, huóyuè zài tiánjiān cǎojì de kūnchóng yě dōu xiāoshēng nìjì.",
        "start": 46.32,
        "end": 55.71
    },
    {
        "text": "到處呈現一片衰草連天的景象，準備迎接風雪載途的寒冬。",
        "pinyin": "Dàochù chéngxiàn yípiàn shuāicǎo liántiān de jǐngxiàng, zhǔnbèi yíngjiē fēngxuě zàitú de hándōng.",
        "start": 55.71,
        "end": 65.5
    },
    {
        "text": "在地球上溫帶和亞熱帶區域裏，年年如是，周而復始。",
        "pinyin": "Zài dìqiú shàng wēndài hé yàrèdài qūyù lǐ, niánnián rúshì, zhōu'érfùshǐ.",
        "start": 65.5,
        "end": 75.93
    },
    {
        "text": "幾千年來，勞動人民注意了草木榮枯、候鳥去來等自然現象同氣候的關係，據以安排農事。",
        "pinyin": "Jǐqiān nián lái, láodòng rénmín zhùyì le cǎomù róngkū, hòuniǎo qùlái děng zìrán xiànxiàng tóng qìhòu de guānxì, jùyǐ ānpái nóngshì.",
        "start": 75.93,
        "end": 89.89
    },
    {
        "text": "杏花開了，就好像大自然在傳語要趕快耕地；桃花開了，又好像在暗示要趕快種穀子。",
        "pinyin": "Xìnghuā kāi le, jiù hǎoxiàng dàzìrán zài chuányǔ yào gǎnkuài gēngdì; Táohuā kāi le, yòu hǎoxiàng zài ànshì yào gǎnkuài zhòng gǔzi.",
        "start": 89.89,
        "end": 104.31
    },
    {
        "text": "布穀鳥開始唱歌，勞動人民懂得它在唱什麼：“阿公阿婆，割麥插禾。”",
        "pinyin": "Bùgǔniǎo kāishǐ chànggē, láodòng rénmín dǒngde tā zài chàng shénme: “Āgōng āpó, gēmài chāhé.”",
        "start": 104.31,
        "end": 115.84
    },
    {
        "text": "這樣看來，花香鳥語，草長鶯飛，都是大自然的語言。",
        "pinyin": "Zhèyàng kànlái, huāxiāng niǎoyǔ, cǎozhǎng yīngfēi, dōu shì dàzìrán de yǔyán.",
        "start": 115.84,
        "end": 124.5
    },
    {
        "text": "這些自然現象，我國古代勞動人民稱它為物候。",
        "pinyin": "Zhèxiē zìrán xiànxiàng, wǒguó gǔdài láodòng rénmín chēng tā wéi wùhòu.",
        "start": 124.5,
        "end": 133.39
    },
    {
        "text": "物候知識在我國起源很早。",
        "pinyin": "Wùhòu zhīshí zài wǒguó qǐyuán hěn zǎo.",
        "start": 133.39,
        "end": 138.43
    },
    {
        "text": "古代流傳下來的許多農諺就包含了豐富的物候知識。",
        "pinyin": "Gǔdài liúchuán xiàlái de xǔduō nóngyàn jiù bāohán le fēngfù de wùhòu zhīshí.",
        "start": 138.43,
        "end": 145.62
    },
    {
        "text": "到了近代，利用物候知識來研究農業生產，已經發展為一門科學，就是物候學。",
        "pinyin": "Dàole jìndài, lìyòng wùhòu zhīshí lái yánjiū nóngyè shēngchǎn, yǐjīng fāzhǎn wéi yì mén kēxué, jiùshì wùhòuxué.",
        "start": 145.62,
        "end": 158.96
    },
    {
        "text": "物候學記錄植物的生長榮枯，動物的養育往來，如桃花開、燕子來等自然現象，從而瞭解隨着時節推移的氣候變化和這種變化對動植物的影響。",
        "pinyin": "Wùhòuxué jìlù zhíwù de shēngzhǎng róngkū, dòngwù de yǎngyù wǎnglái, rú táohuā kāi, yànzi lái děng zìrán xiànxiàng, cóng'ér liǎojiě suízhe shíjié tuīyí de qìhòu biànhuà hé zhèzhǒng biànhuà duì dòngzhíwù de yǐngxiǎng.",
        "start": 158.96,
        "end": 180.89
    }
];

        // 全局變量
        let currentUser = "";
        let completedSet = new Set();
        let audio = document.getElementById('audio-player');
        let currentPlayingIndex = -1;
        let isDevMode = false;
        
        // 開發者模式變量
        let devStartTime = 0;
        let devSentenceIndex = 0;
        let devTimestamps = [];

        // 初始化
        window.onload = function() {
            // 檢測 Windows 顯示開發者按鈕
            if (navigator.userAgent.indexOf("Windows") !== -1) {
                document.getElementById('dev-toggle').style.display = 'block';
            }

            renderSentences();
            renderTrack();
            
            // 鍵盤監聽
            document.addEventListener('keydown', function(e) {
                if (document.getElementById('login-overlay').style.display !== 'none') {
                    if (e.key === 'Enter') checkLogin();
                } else if (isDevMode && e.code === 'Space') {
                    e.preventDefault();
                    markNext();
                }
            });

            // 音頻監聽
            audio.addEventListener('timeupdate', checkAudioTime);
            audio.addEventListener('ended', function() {
                resetPlayState(currentPlayingIndex);
            });
        };

        // --- 登錄邏輯 ---
        function checkLogin() {
            const name = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            if (!name) {
                alert("請輸入名字");
                return;
            }

            if (pass === 'vtcpsc') {
                currentUser = name;
                document.getElementById('login-overlay').style.display = 'none';
            } else {
                errorDiv.style.display = 'block';
                document.getElementById('password').value = '';
            }
        }

        // --- 渲染邏輯 ---
        function renderSentences() {
            const container = document.getElementById('content-area');
            let html = '';
            sentenceData.forEach((item, index) => {
                html += `
                <div class="sentence-block" id="sent-${index}">
                    <div class="pinyin">${item.pinyin}</div>
                    <div class="hanzi">${item.text}</div>
                    <div class="controls">
                        <button class="play-btn" id="btn-${index}" onclick="togglePlay(${index})">
                            <span>▶</span> 播放
                        </button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function renderTrack() {
            const track = document.getElementById('reward-track');
            let html = '';
            // 星星數量 = 句子數量
            for (let i = 0; i < sentenceData.length; i++) {
                html += `<div class="star" id="star-${i}">★</div>`;
            }
            // 獎杯
            html += `<div class="trophy" id="trophy">🏆</div>`;
            track.innerHTML = html;
        }

        // --- 播放邏輯 ---
        function togglePlay(index) {
            const btn = document.getElementById(`btn-${index}`);
            
            // 如果點擊的是當前正在播放的，則切換暫停/播放
            if (currentPlayingIndex === index) {
                if (audio.paused) {
                    audio.play();
                    btn.innerHTML = '<span>❚❚</span> 暫停';
                    btn.classList.add('playing');
                } else {
                    audio.pause();
                    btn.innerHTML = '<span>▶</span> 繼續';
                    btn.classList.remove('playing'); // 暫停時移除高亮
                }
            } else {
                // 如果點擊了新的句子
                // 重置上一個
                if (currentPlayingIndex !== -1) {
                    resetPlayState(currentPlayingIndex);
                }
                
                // 開始新的
                currentPlayingIndex = index;
                audio.currentTime = sentenceData[index].start;
                audio.play();
                
                // UI更新
                btn.innerHTML = '<span>❚❚</span> 暫停';
                btn.classList.add('playing');
                highlightSentence(index);
            }
        }

        function checkAudioTime() {
            if (isDevMode) return; // 開發者模式不干預自動播放
            if (currentPlayingIndex === -1) return;

            const endTime = sentenceData[currentPlayingIndex].end;
            
            if (audio.currentTime >= endTime) {
                audio.pause();
                // 播放完成邏輯
                markSentenceComplete(currentPlayingIndex);
                // 重置播放器狀態（但不自動重播，準備好下次點擊重頭開始）
                resetPlayState(currentPlayingIndex); 
            }
        }

        function resetPlayState(index) {
            if (index === -1) return;
            const btn = document.getElementById(`btn-${index}`);
            if (btn) {
                btn.innerHTML = '<span>▶</span> 播放';
                btn.classList.remove('playing');
            }
            // 移除區塊高亮
            const block = document.getElementById(`sent-${index}`);
            if (block) block.classList.remove('active');
            
            if (currentPlayingIndex === index) {
                currentPlayingIndex = -1;
            }
        }

        function highlightSentence(index) {
            // 移除其他高亮
            document.querySelectorAll('.sentence-block').forEach(b => b.classList.remove('active'));
            document.getElementById(`sent-${index}`).classList.add('active');
        }

        // --- 獎勵與完成邏輯 ---
        function markSentenceComplete(index) {
            if (!completedSet.has(index)) {
                completedSet.add(index);
                // 點亮星星
                const star = document.getElementById(`star-${index}`);
                if (star) star.classList.add('earned');
                
                checkAllCompleted();
            }
        }

        function checkAllCompleted() {
            if (completedSet.size === sentenceData.length) {
                // 點亮獎杯
                document.getElementById('trophy').classList.add('earned');
                // 激活完成按鈕
                const btn = document.getElementById('complete-btn');
                btn.classList.add('active');
                btn.removeAttribute('disabled');
            }
        }

        function finishPractice() {
            if (completedSet.size !== sentenceData.length) return;
            
            // 獲取日期
            const now = new Date();
            const dateStr = `${now.getMonth() + 1}月${now.getDate()}日`;
            const textToCopy = `${currentUser}已於${dateStr}完成作品6號跟讀練習！`;

            // 複製到剪貼板
            navigator.clipboard.writeText(textToCopy).then(() => {
                document.getElementById('modal').style.display = 'flex';
            }).catch(err => {
                console.error('複製失敗:', err);
                // 降級處理：即使複製失敗也顯示彈窗
                document.getElementById('modal').style.display = 'flex';
            });
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // --- 開發者模式邏輯 ---
        function toggleDevMode() {
            if (document.getElementById('dev-panel').style.display === 'block') {
                closeDevMode();
            } else {
                document.getElementById('dev-panel').style.display = 'block';
                isDevMode = true;
            }
        }

        function closeDevMode() {
            document.getElementById('dev-panel').style.display = 'none';
            isDevMode = false;
            audio.pause();
        }

        function startDevRecording() {
            devSentenceIndex = 0;
            devTimestamps = [];
            devStartTime = 0;
            
            audio.currentTime = 0;
            audio.play();
            
            updateDevStatus();
        }

        function markNext() {
            if (!isDevMode || devSentenceIndex >= sentenceData.length) return;

            const now = audio.currentTime;
            
            // 記錄當前句子的數據
            // 開始時間是上一句的結束，如果是第一句則是0
            // 實際上為了精確，我們只記錄斷點。
            // 結構：Start = (上一句end 或 0), End = now
            
            let start = (devSentenceIndex === 0) ? 0 : devTimestamps[devSentenceIndex - 1].end;
            
            // 構建新數據對象（複製原文本，更新時間）
            let newObj = {
                text: sentenceData[devSentenceIndex].text,
                pinyin: sentenceData[devSentenceIndex].pinyin,
                start: parseFloat(start.toFixed(2)),
                end: parseFloat(now.toFixed(2))
            };
            
            devTimestamps.push(newObj);
            devSentenceIndex++;
            
            updateDevStatus();

            if (devSentenceIndex >= sentenceData.length) {
                audio.pause();
                document.getElementById('dev-status').innerText = "錄製完成！請複製下方代碼";
                document.getElementById('dev-output').value = JSON.stringify(devTimestamps, null, 4);
            }
        }

        function updateDevStatus() {
            if (devSentenceIndex < sentenceData.length) {
                const currentText = sentenceData[devSentenceIndex].text;
                document.getElementById('dev-status').innerHTML = 
                    `正在錄製第 ${devSentenceIndex + 1}/${sentenceData.length} 句：<br>${currentText}<br><br>請在該句說完時按空格！`;
            }
        }
    </script>
</body>
</html>
